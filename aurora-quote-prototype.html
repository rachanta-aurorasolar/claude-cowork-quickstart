// ── SAVINGS CALC ──────────────────────────────────────────────────────────────
function calcSavings(bill,utility,addrDone,ev,homeType,shading){
  let base=bill*0.78;
  if(ev==="have") base*=1.35; else if(ev==="planning") base*=1.22;
  if(homeType==="electric") base*=1.08;
  if(shading==="heavy") base*=0.70; else if(shading==="some") base*=0.88;
  const lo=Math.round(base*0.82),hi=Math.round(base*1.12),precise=Math.round(base);
  if(addrDone) return{label:`$${precise}/mo`,sub:"Precise estimate ✓",color:"#16A34A",bg:"#F0FDF4",border:"#86EFAC",pct:100,precise};
  if(utility)  return{label:`$${lo}–$${hi}/mo`,sub:"Narrowing in…",color:Y,bg:"#FFFBEB",border:"#FCD34D",pct:66,precise};
               return{label:`$${Math.round(base*.75)}–$${Math.round(base*1.20)}/mo`,sub:"Rough estimate",color:GRAY,bg:LIGHT,border:"#D1D5DB",pct:33,precise};
}

// ── MONTHLY PAYMENT CALC ──────────────────────────────────────────────────────
function calcMonthly(bill,paymentMode,creditScore){
  const systemCost=bill*110;
  if(paymentMode==="Cash"){
    return{payment:0,label:"$0/mo",upfront:`~$${Math.round(systemCost/1000)}k upfront`,range:null,apr:null,
      note:`Pay ~$${Math.round(systemCost/1000)}k upfront. No monthly payment, maximum 25-year savings.`};
  }
  if(paymentMode==="Lease / PPA"){
    const m=Math.round(bill*0.42);
    return{payment:m,label:`~$${m}/mo`,upfront:"$0 upfront",range:`$${m-15}–$${m+25}/mo`,apr:null,
      note:"Fixed monthly rate. No ownership, but zero maintenance responsibility and no upfront cost."};
  }
  // Loan
  const rateMap={excellent:0.049,good:0.059,fair:0.079,building:0.099};
  const rate=rateMap[creditScore]||0.059;
  const rHi=rate+0.015;
  const r=rate/12,rH=rHi/12,t=240;
  const lo=Math.round(systemCost*r/(1-Math.pow(1+r,-t)));
  const hi=Math.round(systemCost*rH/(1-Math.pow(1+rH,-t)));
  return{payment:lo,label:`~$${lo}/mo`,upfront:"$0 upfront",
    range:`$${lo}–$${hi}/mo`,apr:`${(rate*100).toFixed(1)}–${(rHi*100).toFixed(1)}% APR`,
    note:`20-year loan. You own the system outright. Most popular option.`};
}

// ── FINANCING SMART RECOMMENDATION ───────────────────────────────────────────
function getFinRec(finPriority,creditScore,taxLiability,stayDuration){
  let rec=FIN_MAP[finPriority]||"Loan",note=null;
  if(stayDuration==="under5"&&rec!=="Lease / PPA"){rec="Lease / PPA";note="Since you're planning to move within 5 years, Lease/PPA avoids long-term commitment and is easier to transfer.";}
  if(creditScore==="building"&&rec==="Loan"){rec="Lease / PPA";note="Solar loans typically require a 650+ credit score. Lease/PPA is easier to qualify for while you build credit.";}
  return{rec,note};
}

// ── LOCATION BAR ──────────────────────────────────────────────────────────────
function LocationBar({location,setLocation}){
  const [editing,setEditing]=useState(false);
  const [inp,setInp]=useState(location.zip);
  const [error,setError]=useState(false);
  function submit(){const f=getZipData(inp.trim());if(f){setLocation(f);setEditing(false);setError(false);}else setError(true);}
  return <div style={{display:"flex",justifyContent:"center",marginBottom:20,position:"relative"}}>
    {!editing
      ?<div style={{display:"inline-flex",alignItems:"center",gap:8,background:WHITE,border:"1.5px solid #E5E7EB",borderRadius:24,padding:"8px 16px",fontSize:13}}>
        <span>📍</span>
        <span style={{color:DARK,fontWeight:500}}>{location.city}, {location.state} {location.zip}</span>
        <button onClick={()=>{setInp(location.zip);setEditing(true);setError(false);}} style={{background:"none",border:"none",color:Y,fontWeight:600,fontSize:12,cursor:"pointer",padding:"0 0 0 4px"}}>Change</button>
      </div>
      :<div style={{display:"inline-flex",alignItems:"center",gap:8,background:WHITE,border:`1.5px solid ${error?"#EF4444":Y}`,borderRadius:24,padding:"6px 6px 6px 14px",fontSize:13}}>
        <span>📍</span>
        <input type="text" value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="Enter ZIP" maxLength={5} autoFocus
          style={{border:"none",outline:"none",width:70,fontSize:13,fontFamily:"inherit",color:DARK,background:"transparent"}}/>
        <button onClick={submit} style={{background:Y,border:"none",borderRadius:20,padding:"5px 12px",fontWeight:700,fontSize:12,cursor:"pointer",color:DARK}}>Go</button>
        <button onClick={()=>{setEditing(false);setError(false);}} style={{background:"none",border:"none",color:GRAY,cursor:"pointer",fontSize:13,padding:"0 4px"}}>✕</button>
      </div>
    }
    {error&&<div style={{position:"absolute",top:42,color:"#EF4444",fontSize:12,fontWeight:500}}>ZIP not found — try 99501, 77494, or 10001</div>}
  </div>;
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
          {[
            {icon:"🛰️",title:"Satellite roof analysis",desc:"Aurora's AI measures your exact roof dimensions, pitch, and orientation from satellite imagery — no ladder required before the site visit."},
            {icon:"☀️",title:"Real production modeling",desc:"Full 3D sun-path simulation calculates exactly how much energy your panels will produce each month, not just an annual average."},
            {icon:"📐",title:"Precision system sizing",desc:"The right number of panels in the right spots. Aurora designs for maximum output — not just maximum panel count."},
            {icon:"📲",title:"Live homeowner monitoring",desc:"Once your system is live, track real-time production and cumulative savings from the Aurora app — day one, every day."},
          ].map(f=>(
            <div key={f.title} style={{background:LIGHT,borderRadius:10,padding:"12px 14px"}}>
              <div style={{fontSize:20,marginBottom:6}}>{f.icon}</div>
              <div style={{fontWeight:600,color:DARK,fontSize:13,marginBottom:4}}>{f.title}</div>
              <div style={{color:GRAY,fontSize:12,lineHeight:1.5}}>{f.desc}</div>
            </div>
          ))}
        </div>
        <InfoNote color="#1E40AF" bg="#EFF6FF" border="#BFDBFE">
          🏆 Aurora is used by 9 of the top 10 US solar installers. Every installer in our network designs your system on Aurora — so your proposal is built on real data, not a rough guess.
        </InfoNote>
      </Widget>

      {/* Interactive process steps */}
      <Widget>
        <WTitle title="The solar process, step by step" sub="Tap any step — includes what Aurora does behind the scenes"/>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {STEPS.map(s=>{
            const isOpen=openStep===s.n,isCurrent=stage!==null&&s.n===stage+1;
            return <div key={s.n} style={{borderRadius:10,overflow:"hidden",border:isCurrent?`2px solid ${Y}`:"1.5px solid transparent",transition:"all .2s"}}>
              <div onClick={()=>setOpenStep(isOpen?null:s.n)} style={{display:"flex",gap:14,alignItems:"center",padding:"13px 16px",cursor:"pointer",background:isOpen?"#FFFBEB":isCurrent?"#FFFDE7":LIGHT,transition:"background .15s"}}>
                <div style={{width:30,height:30,borderRadius:"50%",background:isCurrent||isOpen?Y:"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:13,flexShrink:0,transition:"background .2s"}}>{s.n}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,color:DARK,fontSize:14}}>{s.icon} {s.title}</div>
                  {!isOpen&&<div style={{color:GRAY,fontSize:12,marginTop:1}}>{s.short}</div>}
                </div>
                {isCurrent&&!isOpen&&<span style={{background:Y,color:DARK,fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:20,flexShrink:0}}>UP NEXT</span>}
                <span style={{color:GRAY}}>{isOpen?"▾":"▸"}</span>
              </div>
              {isOpen&&<div style={{padding:"0 16px 16px 60px",background:"#FFFBEB"}}>
                <div style={{color:"#78350F",fontSize:13,lineHeight:1.7,borderTop:"1px solid #FDE68A",paddingTop:10,marginBottom:12}}>{s.long}</div>
                {s.aurora&&<div style={{background:"#111",borderRadius:8,padding:"10px 14px",display:"flex",gap:8,alignItems:"flex-start"}}>
                  <span style={{color:Y,fontSize:14,flexShrink:0,marginTop:1}}>⚡</span>
                  <div style={{color:"#E5E7EB",fontSize:12,lineHeight:1.6}}><strong style={{color:Y}}>Aurora's role: </strong>{s.aurora}</div>
                </div>}
              </div>}
            </div>;
          })}
        </div>
      </Widget>

      {/* Pre-installer data collection */}
      <Widget highlight={!!creditScore||bill!==200}>
        <WTitle title="Make your estimate real" sub="A couple of details sharpens everything above"/>
        <div style={{marginBottom:16}}>
          <div style={{fontWeight:600,fontSize:13,color:DARK,marginBottom:8}}>Roughly what's your credit score? 💳</div>
          <div style={{fontSize:12,color:GRAY,marginBottom:8}}>Helps show realistic financing options alongside savings</div>
          <Chips cols={2} value={creditScore} onChange={setCreditScore} options={[
            {key:"excellent",label:"Excellent (750+)"},
            {key:"good",     label:"Good (700–749)"},
            {key:"fair",     label:"Fair (640–699)"},
            {key:"building", label:"Building (<640)"},
          ]}/>
        </div>
        <div>
          <div style={{fontWeight:600,fontSize:13,color:DARK,marginBottom:8}}>Average monthly electric bill 💡</div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{color:GRAY,fontSize:13}}>Drag to set your bill</span>
            <span style={{fontWeight:800,fontSize:22,color:DARK}}>${bill}</span>
          </div>
          <input type="range" min={50} max={800} step={10} value={bill} onChange={e=>setBill(+e.target.value)}/>
          <div style={{display:"flex",justifyContent:"space-between",color:GRAY,fontSize:12,marginTop:6}}><span>$50</span><span>$400</span><span>$800+</span></div>
        </div>
      </Widget>

      <Widget highlight={!!utility}>
        <WTitle title="Utility provider" sub="Calibrates local solar rates" check={utility?"gold":null}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {(location.utilities||["Municipal Light and Power","Chugach Electric","Matanuska Electric","Don't know"]).map(u=>(
            <div key={u} onClick={()=>setUtility(u)}
              style={{padding:"10px 14px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:utility===u?700:400,color:utility===u?DARK:GRAY,background:utility===u?"#FFFBEB":LIGHT,border:utility===u?`1.5px solid ${Y}`:"1.5px solid transparent",transition:"all .15s"}}>
              {utility===u?"✓ ":""}{u}
            </div>
          ))}
        </div>
      </Widget>

      <AddressWidget address={address} setAddress={setAddress} addrDone={addrDone} setAddrDone={setAddrDone}/>
    </div>

    <CtaBox
      ready={addrDone}
      readyMsg="✓ Ready — here are installers near you with personalised estimates"
      notReadyMsg="Add your address for personalised results — or browse installers now."
      onClick={()=>go("installers")}
      label="See installers in my area →"
    />
  </Page>;
}

// ── BATTERY ───────────────────────────────────────────────────────────────────
function Battery({go}){
  const [email,setEmail]=useState("");
  const [phone,setPhone]=useState("");
  const [name,setName]=useState("");
  const [done,setDone]=useState(false);
  const canSubmit=email.includes("@")&&name.trim().length>1;
  return <Page>
    <Back go={go} to="home"/>
    <div style={{textAlign:"center",padding:"20px 0 24px"}}>
      <div style={{fontSize:56,marginBottom:16}}>🔋</div>
      <h2 style={{fontSize:28,fontWeight:800,color:DARK,margin:"0 0 12px"}}>Battery & backup storage</h2>
      <p style={{color:GRAY,fontSize:15}}>Energy independence, outage protection, and EV charging — from your own roof.</p>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <Widget>
        <WTitle title="What battery storage unlocks"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {[{icon:"🌩️",t:"Outage protection",d:"Keep lights on when the grid goes down"},{icon:"🚗",t:"EV charging",d:"Charge your car with clean energy"},{icon:"🌙",t:"Use solar after dark",d:"Store energy during the day"},{icon:"📈",t:"Maximize savings",d:"Sell excess at peak rates"}].map(f=>(
            <div key={f.t} style={{background:LIGHT,borderRadius:10,padding:14}}>
              <div style={{fontSize:22,marginBottom:6}}>{f.icon}</div>
              <div style={{fontWeight:600,color:DARK,fontSize:13,marginBottom:2}}>{f.t}</div>
              <div style={{color:GRAY,fontSize:12}}>{f.d}</div>
            </div>
          ))}
        </div>
      </Widget>

      {!done
        ?<div style={{background:"#FFFBEB",border:`1.5px solid ${Y}`,borderRadius:14,padding:24}}>
          <div style={{fontWeight:700,fontSize:18,color:DARK,marginBottom:4}}>Talk to a battery specialist</div>
          <div style={{color:GRAY,fontSize:14,lineHeight:1.6,marginBottom:20}}>Battery storage is available in select areas. Leave your details and one of our associates will reach out to walk you through your options — no pressure, no commitment.</div>
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            <div>
              <div style={{fontSize:12,color:GRAY,fontWeight:500,marginBottom:4}}>Your name</div>
              <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Jane Smith"
                style={{width:"100%",padding:"11px 14px",borderRadius:8,border:"1.5px solid #D1D5DB",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div>
              <div style={{fontSize:12,color:GRAY,fontWeight:500,marginBottom:4}}>Email address <span style={{color:"#EF4444"}}>*</span></div>
              <input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@email.com"
                style={{width:"100%",padding:"11px 14px",borderRadius:8,border:"1.5px solid #D1D5DB",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
            </div>
            <div>
              <div style={{fontSize:12,color:GRAY,fontWeight:500,marginBottom:4}}>Phone number <span style={{color:GRAY,fontWeight:400}}>(optional — for a faster response)</span></div>
              <input type="tel" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(555) 000-0000"
                style={{width:"100%",padding:"11px 14px",borderRadius:8,border:"1.5px solid #D1D5DB",fontSize:14,outline:"none",fontFamily:"inherit"}}/>
            </div>
          </div>
          <Btn onClick={()=>setDone(true)} full disabled={!canSubmit}>Request a callback →</Btn>
          <div style={{fontSize:11,color:GRAY,textAlign:"center",marginTop:10}}>🔒 Your info is never shared without your permission.</div>
        </div>

        :<div style={{background:"#F0FDF4",border:"1.5px solid #86EFAC",borderRadius:14,padding:28,textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontWeight:700,fontSize:20,color:"#15803D",marginBottom:8}}>You're all set, {name.split(" ")[0]}!</div>
          <div style={{color:"#166534",fontSize:14,lineHeight:1.7,marginBottom:8}}>
            One of our battery storage associates will reach out to you{phone?" by phone or email":" by email"} within 1–2 business days to walk you through what's available in your area.
          </div>
          <div style={{color:"#15803D",fontSize:13,marginBottom:24,background:WHITE,borderRadius:8,padding:"10px 14px",display:"inline-block"}}>
            📧 {email}{phone&&<><br/>📞 {phone}</>}
          </div>
          <div><Btn onClick={()=>go("home")} secondary>Explore other paths</Btn></div>
        </div>
      }
    </div>
  </Page>;
}

// ── INSTALLERS ────────────────────────────────────────────────────────────────
function Installers({go,bill,utility,address,addrDone,finPriority,location,ev,homeType,shading,creditScore,taxLiability,stayDuration,motivation,roofAge,paymentMode,setPaymentMode}){
  const [openIdx,setOpenIdx]=useState(null);
  const {rec}=getFinRec(finPriority,creditScore,taxLiability,stayDuration);
  const preferred=paymentMode||"Loan";
  const sv=calcSavings(bill,utility,addrDone,ev,homeType,shading);
  const mp=calcMonthly(bill,preferred,creditScore);
  const netSavings=sv.precise-(mp.payment||0);

  const tags=[
    bill&&`$${bill}/mo bill`,
    utility&&utility,
    addrDone&&address,
    finPriority&&`Prefers ${preferred}`,
    ev==="have"&&"Has EV",
    ev==="planning"&&"Planning EV",
    homeType==="electric"&&"All-electric",
    shading==="heavy"&&"Heavy shading",
    shading==="some"&&"Some shading",
    roofAge==="over20"&&"Roof 20+ yrs",
    creditScore&&({excellent:"Credit: Excellent",good:"Credit: Good",fair:"Credit: Fair",building:"Credit: Building"}[creditScore]),
    motivation&&({savings:"💰 Saving money",independence:"⚡ Energy independence",environment:"🌱 Going green",value:"🏡 Home value"}[motivation]),
  ].filter(Boolean);

  return <div style={{minHeight:"100vh",background:LIGHT}}>
    <Nav/>
    <div style={{maxWidth:680,margin:"0 auto",padding:"32px 24px"}}>
      <h2 style={{fontSize:28,fontWeight:800,color:DARK,margin:"0 0 6px"}}>Installers in {location.city}, {location.state}</h2>
      <p style={{color:GRAY,fontSize:15,margin:"0 0 16px"}}>Matched based on what you told us.</p>

      {tags.length>0&&<div style={{background:"#F0FDF4",border:"1px solid #86EFAC",borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
        <span style={{color:"#15803D",fontWeight:600,fontSize:13}}>Your profile:</span>
        {tags.map(t=><span key={t} style={{background:"#DCFCE7",color:"#166534",fontSize:12,fontWeight:500,padding:"3px 10px",borderRadius:20}}>{t}</span>)}
      </div>}

      {/* Payment toggle — pick how you'd like to pay, numbers update live */}
      <PaymentToggle paymentMode={preferred} setPaymentMode={setPaymentMode} rec={rec}/>
      <div style={{background:WHITE,border:"1.5px solid #E5E7EB",borderRadius:12,padding:"14px 16px",marginBottom:8}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {preferred==="Cash"
            ?<>
              <StatBox label="System cost" value={mp.upfront}/>
              <StatBox label="Monthly savings" value={sv.label} green/>
              <StatBox label="Payback period" value="6–8 years"/>
              <StatBox label="25-yr savings" value={`~$${(sv.precise*12*22).toLocaleString()}`} green/>
            </>
            :<>
              <StatBox label="Monthly payment" value={mp.range||mp.label}/>
              <StatBox label="Monthly savings" value={sv.label} green/>
              {mp.apr&&<StatBox label="Rate range" value={mp.apr}/>}
              <StatBox label="Net benefit" value={netSavings>=0?`+$${netSavings}/mo`:`-$${Math.abs(netSavings)}/mo`} green={netSavings>0}/>
            </>
          }
        </div>
        <div style={{fontSize:12,color:GRAY,marginTop:10,lineHeight:1.5}}>{mp.note}</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:14,marginBottom:24}}>
        {INSTALLERS.map((inst,i)=>(
          <div key={i} style={{background:WHITE,border:"1.5px solid #E5E7EB",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:20}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                <div style={{display:"flex",gap:12}}>
                  <div style={{width:48,height:48,borderRadius:10,background:LIGHT,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>{inst.logo}</div>
                  <div>
                    <div style={{fontWeight:700,fontSize:16,color:DARK}}>{inst.name}</div>
                    <div style={{color:GRAY,fontSize:12}}>In business since {inst.since}</div>
                    <div style={{display:"flex",gap:4,alignItems:"center",marginTop:2}}>
                      <span style={{color:"#F59E0B",fontSize:13}}>{"★".repeat(Math.floor(inst.rating))}</span>
                      <span style={{fontSize:12,color:GRAY}}>{inst.rating} ({inst.reviews})</span>
                    </div>
                  </div>
                </div>
                {inst.nabcep&&<div style={{background:"#EFF6FF",color:"#1D4ED8",fontSize:11,fontWeight:600,padding:"3px 8px",borderRadius:20,border:"1px solid #BFDBFE",flexShrink:0,cursor:"help"}} title="Passed the solar industry's most rigorous training.">✓ NABCEP</div>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                <StatBox label={preferred==="Cash"?"Upfront cost":"Monthly payment"} value={preferred==="Cash"?mp.upfront:(mp.range||mp.label)}/>
                <StatBox label="Monthly savings" value={sv.label.includes("–")?sv.label.split("–")[0]+"+":sv.label} green/>
                <StatBox label="Net benefit" value={netSavings>=0?`+$${netSavings}/mo`:`-$${Math.abs(netSavings)}/mo`} green={netSavings>0}/>
              </div>
              <button onClick={()=>setOpenIdx(openIdx===i?null:i)} style={{background:"none",border:"none",color:GRAY,fontSize:13,cursor:"pointer",padding:0}}>
                {openIdx===i?"▾ Hide details":"▸ System specs · Energy costs · Installer info"}
              </button>
              {openIdx===i&&<div style={{borderTop:"1px solid #F3F4F6",marginTop:12,paddingTop:14,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:13}}>
                <div><span style={{color:GRAY}}>System size</span><br/><strong>{ev==="have"?"11.2 kW":"8.4 kW"}</strong></div>
                <div><span style={{color:GRAY}}>Panels</span><br/><strong>{ev==="have"?"28 × 400W":"21 × 400W"}</strong></div>
                <div><span style={{color:GRAY}}>Annual production</span><br/><strong>{ev==="have"?"12,400 kWh":"9,200 kWh"}</strong></div>
                <div><span style={{color:GRAY}}>25-yr savings</span><br/><strong style={{color:"#15803D"}}>~${(sv.precise*12*22).toLocaleString()}</strong></div>
                <div><span style={{color:GRAY}}>Warranty</span><br/><strong>25 years</strong></div>
                {mp.apr&&<div><span style={{color:GRAY}}>Loan rate</span><br/><strong>{mp.apr}</strong></div>}
              </div>}
            </div>
            <div style={{padding:"0 20px 20px"}}>
              <button style={{width:"100%",background:Y,border:"none",borderRadius:8,padding:"13px 0",fontWeight:700,fontSize:15,cursor:"pointer",color:DARK}}>
                Contact {inst.name.split(" ")[0]} →
              </button>
            </div>
          </div>
        ))}
      </div>

      <div style={{textAlign:"center",marginBottom:16}}>
        <button onClick={()=>go("home")} style={{background:"none",border:"none",color:GRAY,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>← Explore a different path</button>
      </div>
      <p style={{color:GRAY,fontSize:11,lineHeight:1.6}}>* All numbers are estimates based on your inputs and are not guaranteed.</p>
    </div>
    <Footer/>
  </div>;
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const [screen,       setScreen]      = useState("home");
  const [path,         setPath]        = useState(null);
  const [bill,         setBill]        = useState(200);
  const [utility,      setUtility]     = useState(null);
  const [address,      setAddress]     = useState("");
  const [addrDone,     setAddrDone]    = useState(false);
  const [finPriority,  setFinPriority] = useState(null);
  const [location,     setLocation]    = useState(DEFAULT_ZIP);
  const [isOwner,      setIsOwner]     = useState(null);
  const [paymentMode,  setPaymentMode] = useState("Loan");
  // savings qualifiers
  const [ev,           setEv]          = useState(null);
  const [homeType,     setHomeType]    = useState(null);
  const [shading,      setShading]     = useState(null);
  // financing + shared qualifiers — credit defaults to "good"
  const [creditScore,  setCreditScore] = useState("good");
  const [taxLiability, setTaxLiability]= useState(null);
  const [stayDuration, setStayDuration]= useState(null);
  // education qualifiers
  const [motivation,   setMotivation]  = useState(null);
  const [hasHOA,       setHasHOA]      = useState(null);
  const [roofAge,      setRoofAge]     = useState(null);

  function handleSetLocation(loc){setLocation(loc);setUtility(null);}
  const go=(s)=>{setScreen(s);window.scrollTo(0,0);};
  const shared={go,bill,setBill,utility,setUtility,address,setAddress,addrDone,setAddrDone,finPriority,setFinPriority,location,isOwner,ev,setEv,homeType,setHomeType,shading,setShading,creditScore,setCreditScore,taxLiability,setTaxLiability,stayDuration,setStayDuration,motivation,setMotivation,hasHOA,setHasHOA,roofAge,setRoofAge,paymentMode,setPaymentMode};

  if(screen==="home")       return <Home      {...shared} setPath={setPath} setIsOwner={setIsOwner} setLocation={handleSetLocation}/>;
  if(screen==="savings")    return <Savings   {...shared}/>;
  if(screen==="financing")  return <Financing {...shared}/>;
  if(screen==="education")  return <Education {...shared}/>;
  if(screen==="battery")    return <Battery   go={go}/>;
  if(screen==="installers") return <Installers {...shared}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
